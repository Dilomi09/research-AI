name: Build release artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm ci || npm ci
      - run: npm run build
      - run: npm install --no-save electron@37 electron-builder@25
      - run: npx electron-builder --config electron-builder.yml --win nsis --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: research-ai-windows-exe
          path: dist/*.exe

  macos-dmg:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm ci || npm ci
      - run: npm run build
      - run: npm install --no-save electron@37 electron-builder@25
      - run: npx electron-builder --config electron-builder.yml --mac dmg --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: research-ai-macos-dmg
          path: dist/*.dmg

  android-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v3
      - run: npm ci || npm ci || npm ci
      - run: npm run build
      - run: npm install --no-save @capacitor/cli@7 @capacitor/core@7 @capacitor/android@7
      - run: npx cap add android
      - run: npx cap sync android
      - run: cd android && ./gradlew assembleDebug
      - run: mkdir -p release-assets && cp android/app/build/outputs/apk/debug/app-debug.apk release-assets/research-ai-android-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: research-ai-android-apk
          path: release-assets/research-ai-android-debug.apk

  publish-release:
    if: always() && startsWith(github.ref, 'refs/tags/v') && (needs.windows-exe.result == 'success' || needs.macos-dmg.result == 'success' || needs.android-apk.result == 'success')
    needs: [windows-exe, macos-dmg, android-apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: release-assets
      - name: Generate Changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            echo "### Changelog" > CHANGELOG.txt
            git log --pretty=format:"* %s (%h)" >> CHANGELOG.txt
          else
            echo "### Changelog since $PREV_TAG" > CHANGELOG.txt
            git log ${PREV_TAG}..HEAD --pretty=format:"* %s (%h)" >> CHANGELOG.txt
          fi
      - name: Publish GitHub release with assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            release-assets/research-ai-windows-exe/*.exe
            release-assets/research-ai-macos-dmg/*.dmg
            release-assets/research-ai-android-apk/*.apk
          body_path: CHANGELOG.txt
          fail_on_unresolved_entities: false
